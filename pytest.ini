[pytest]
# Test directories (v3 architecture - Dec 2025)
# Unit/Integration tests in core/, E2E tests in e2e/
testpaths =
    core/agents/tests
    core/common/tests
    core/learning_loop/tests
    core/llm_gateway/tests
    core/session/tests
    e2e/tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# NOTE: pythonpath removed - PYTHONPATH=/app is set by Docker
# All imports should use absolute paths: from core.agents... not from agents...

asyncio_mode = auto

addopts = -v --strict-markers --tb=short --disable-warnings --color=yes

markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may require DB/Redis)
    system: System tests
    slow: Slow-running tests (>30s)
    benchmark: Performance benchmarks
    llm: Tests that use LLM APIs
    longitudinal: Long-running tests that track metrics over time
    context_collapse: Tests for context window management
    outcome_accuracy: Tests for factual accuracy validation
    requires_kafka: Tests that require Kafka
    requires_postgres: Tests that require PostgreSQL
    requires_mcp: Tests that require MCP servers
    sql_validation: SQL query syntax validation against real PostgreSQL schema
    db_integration: Database integration tests with real PostgreSQL
    pipeline: End-to-end Learning Loop pipeline tests (ADVISOR->GENERATOR->CLUSTERER)
    e2e: End-to-end tests requiring full system (all services running)
    critical: Critical path tests (learning loop, session lifecycle)
    resilience: Resilience and chaos tests
    agents: Agents service tests (LIBRARIAN and STRATEGIST)
